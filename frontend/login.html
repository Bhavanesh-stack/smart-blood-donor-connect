<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to Smart Blood Donor Connect to manage your donor profile or find blood donors.">
  <title>Login — Smart Blood Donor Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/custom.css">
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
    }
  </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-red-50 via-white to-rose-50 flex items-center justify-center p-4 font-sans">

  <!-- Background decoration -->
  <div class="fixed inset-0 pointer-events-none overflow-hidden">
    <div class="absolute top-10 left-10 w-72 h-72 bg-red-100 rounded-full filter blur-3xl opacity-40"></div>
    <div class="absolute bottom-10 right-10 w-96 h-96 bg-rose-100 rounded-full filter blur-3xl opacity-30"></div>
  </div>

  <div class="w-full max-w-md relative z-10 fade-in-up">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="/" class="inline-flex items-center gap-2">
        <span class="text-4xl">🩸</span>
        <span class="text-xl font-bold text-gray-900">Smart Blood Donor <span class="text-red-600">Connect</span></span>
      </a>
    </div>

    <!-- Login Card -->
    <div class="bg-white/80 backdrop-blur-xl rounded-2xl shadow-xl border border-white/50 p-8">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Welcome Back</h1>
        <p class="text-gray-500">Sign in to your account</p>
      </div>

      <form id="login-form" class="space-y-5">
        <!-- Email -->
        <div>
          <label for="email" class="block text-sm font-semibold text-gray-700 mb-1.5">Email Address</label>
          <div class="relative">
            <span class="absolute left-3 top-3 text-gray-400">📧</span>
            <input type="email" id="email" name="email" required placeholder="you@example.com"
              class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none transition-all bg-gray-50 hover:bg-white">
          </div>
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
          <div class="relative">
            <span class="absolute left-3 top-3 text-gray-400">🔒</span>
            <input type="password" id="password" name="password" required placeholder="••••••••" minlength="8"
              class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none transition-all bg-gray-50 hover:bg-white">
          </div>
        </div>

        <!-- Error Message -->
        <div id="error-msg" class="hidden bg-red-50 text-red-600 text-sm px-4 py-3 rounded-xl border border-red-100"></div>

        <!-- Submit -->
        <button type="submit" id="login-btn"
          class="w-full bg-red-600 hover:bg-red-700 text-white py-3.5 rounded-xl font-bold text-lg transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5 flex items-center justify-center gap-2">
          <span id="login-text">Sign In</span>
          <div id="login-spinner" class="spinner hidden" style="width:20px;height:20px;border-width:2px;border-top-color:white;border-color:rgba(255,255,255,0.3);border-top-color:white;"></div>
        </button>
      </form>

      <div class="mt-6 text-center">
        <p class="text-gray-500 text-sm">
          Don't have an account? 
          <a href="/register.html" class="text-red-600 hover:text-red-700 font-semibold hover:underline">Register</a>
        </p>
      </div>
    </div>

    <p class="text-center text-gray-400 text-xs mt-6">&copy; 2026 Smart Blood Donor Connect</p>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    // Redirect if already logged in
    redirectIfAuth();

    const form = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-msg');
    const loginBtn = document.getElementById('login-btn');
    const loginText = document.getElementById('login-text');
    const loginSpinner = document.getElementById('login-spinner');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.add('hidden');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Show loading
      loginBtn.disabled = true;
      loginText.textContent = 'Signing in...';
      loginSpinner.classList.remove('hidden');

      try {
        const data = await loginUser({ email, password });
        saveAuth(data.token, data.user);
        showToast('Login successful! Redirecting...', 'success');
        setTimeout(() => redirectByRole(), 800);
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.classList.remove('hidden');
        loginBtn.disabled = false;
        loginText.textContent = 'Sign In';
        loginSpinner.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
